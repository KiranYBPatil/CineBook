---
# ============================================
# CineBook - Ansible Deployment Playbook
# Deploys Docker containers to AWS EC2
# ============================================

- name: Deploy CineBook to AWS EC2
  hosts: all
  become: true

  vars:
    app_dir: /home/ubuntu/CineBook
    ec2_ip: "3.27.249.93"

  tasks:

    # ─── 1. Install Dependencies ──────────────────────
    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present
        update_cache: yes

    # ─── 2. Install Docker ────────────────────────────
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    # ─── 3. Clone / Update Repo ───────────────────────
    - name: Clone CineBook repository
      git:
        repo: https://github.com/KiranYBPatil/CineBook.git
        dest: "{{ app_dir }}"
        version: main
        force: yes
      become_user: ubuntu

    # ─── 4. Create .env file ──────────────────────────
    - name: Create backend .env file
      copy:
        dest: "{{ app_dir }}/bms-backend/.env"
        content: |
          PORT=9000
          MONGO_CONNECTION_STRING=mongodb://mongo:27017/bookmyscreen
          JWT_SECRET=cinebook_jwt_secret_2026
          ACCESS_TOKEN_SECRET=cinebook_access_token_secret_2026
          REFRESH_TOKEN_SECRET=cinebook_refresh_token_secret_2026
          HASH_SECRET=cinebook_hash_secret_2026
          FRONTEND_URL=http://{{ ec2_ip }}
          NODEMAILER_EMAIL=
          NODEMAILER_PASSWORD=
        owner: ubuntu
        mode: "0600"

    # ─── 5. Stop existing containers ─────────────────
    - name: Stop existing containers
      shell: docker compose down --remove-orphans
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu
      ignore_errors: yes

    # ─── 6. Build & Start containers ─────────────────
    - name: Build and start containers
      shell: docker compose up -d --build
      args:
        chdir: "{{ app_dir }}"
      become_user: ubuntu

    # ─── 7. Health Check ──────────────────────────────
    - name: Wait for backend to be healthy
      uri:
        url: "http://localhost/api/v1/movies"
        status_code: 200
      register: health
      until: health.status == 200
      retries: 15
      delay: 10

    # ─── 8. Done ──────────────────────────────────────
    - name: Deployment complete
      debug:
        msg: "✅ CineBook deployed! Frontend: http://{{ ec2_ip }}  API: http://{{ ec2_ip }}/api/v1"
